services:
  postgres:
    image: postgres:16-alpine
    container_name: whatsend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: whatsend
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: whatsend-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: whatsend-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/whatsend?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
    volumes:
      - wwebjs_auth:/app/wwebjs_auth
      - uploads_data:/app/uploads
      - backups_data:/app/backups
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: whatsend-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  wwebjs_auth:
  uploads_data:
  backups_data:
