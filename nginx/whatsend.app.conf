# ============================================================
# Nginx — whatsend.app
# Ubicación en el servidor: /etc/nginx/sites-available/whatsend.app
# Activar con: ln -s /etc/nginx/sites-available/whatsend.app /etc/nginx/sites-enabled/
# SSL gestionado por Certbot (Let's Encrypt)
#
# Todas estas URLs llevan a la app (https://whatsend.app):
#   http://whatsend.app  → 301 → https://whatsend.app
#   http://www.whatsend.app  → 301 → https://whatsend.app
#   https://www.whatsend.app  → 301 → https://whatsend.app
#   https://whatsend.app  → sirve la app
# ============================================================

# No exponer la versión de Nginx en cabeceras y páginas de error
server_tokens off;

# Redirigir HTTP → HTTPS (tanto whatsend.app como www)
server {
    listen 80;
    listen [::]:80;
    server_name whatsend.app www.whatsend.app;
    return 301 https://whatsend.app$request_uri;
}

# Redirigir HTTPS www → apex (whatsend.app sin www)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.whatsend.app;

    ssl_certificate     /etc/letsencrypt/live/whatsend.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsend.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://whatsend.app$request_uri;
}

# Servidor principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name whatsend.app;

    ssl_certificate     /etc/letsencrypt/live/whatsend.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/whatsend.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Logs
    access_log /var/log/nginx/whatsend.access.log;
    error_log  /var/log/nginx/whatsend.error.log;

    # Tamaño máximo de upload (imágenes y audios de plantillas)
    client_max_body_size 25M;

    # ── SSE: QR de WhatsApp ───────────────────────────────
    # Timeout largo solo para endpoints de Server-Sent Events
    location = /api/whatsapp/qr {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # ── SSE: Progreso de campaña ──────────────────────────
    location ~ ^/api/campaigns/[0-9]+/events$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # ── API REST (Node.js en puerto 3001) ─────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection      '';
        proxy_buffering    off;
        proxy_cache        off;
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'none'; frame-ancestors 'none'" always;
    }

    # ── Frontend estático (React build) ──────────────────
    root /var/www/whatsend/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;

        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'" always;
    }

    # Cache agresivo para assets con hash (Vite los genera con hash en el nombre)
    location ~* \.(js|css|woff2|woff|ttf|svg|png|jpg|jpeg|webp|ico)$ {
        expires 1y;
        add_header Cache-Control             "public, immutable";
        add_header X-Content-Type-Options    "nosniff"      always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        access_log off;
    }
}
