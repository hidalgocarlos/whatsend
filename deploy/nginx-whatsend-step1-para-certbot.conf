# Paso 1 — Solo puerto 80 para que Certbot pueda validar el dominio
# Copiar a /etc/nginx/sites-available/whatsend.app ANTES de ejecutar certbot
# Después de: certbot --nginx -d whatsend.app -d www.whatsend.app
# Reemplazar con: nginx/whatsend.app.conf (config completa con SSL)

server {
    listen 80;
    listen [::]:80;
    server_name whatsend.app www.whatsend.app;

    location / {
        root /var/www/whatsend/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
